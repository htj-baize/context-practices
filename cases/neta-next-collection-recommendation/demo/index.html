<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neta Recommendation Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Context-Driven Recommendation Demo</div>
          <h1>点赞后继续推荐</h1>
          <p id="hero-summary">
            正在加载推荐数据。
          </p>
          <div class="hero-flow" id="hero-flow"></div>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <main class="layout">
        <section class="focus-column">
          <section class="panel focus-tabs-panel">
            <div class="panel-head">
              <div>
                <div class="panel-kicker">主视图</div>
                <h2>Focus Views</h2>
              </div>
              <button class="ghost-button" id="reset-button" type="button">重置</button>
            </div>
            <div class="focus-tabs" id="focus-tabs">
              <button class="focus-tab is-active" data-tab="current" type="button">当前种子</button>
              <button class="focus-tab" data-tab="next" type="button">下一个</button>
              <button class="focus-tab" data-tab="queue" type="button">推荐列表</button>
            </div>

            <div class="focus-view is-active" data-view="current">
              <div id="current-card"></div>
            </div>

            <div class="focus-view" data-view="next">
              <div class="panel-subcopy">优先展示当前最值得推给用户的下一条作品。</div>
              <div id="next-card"></div>
            </div>

            <div class="focus-view" data-view="queue">
              <div class="queue-caption">默认展开，点击卡片即可点赞或跳过。</div>
              <div class="mobile-deck-controls" id="mobile-deck-controls">
                <button class="ghost-button deck-nav-button" id="deck-prev" type="button">上一张</button>
                <div class="deck-status" id="deck-status">1 / 1</div>
                <button class="ghost-button deck-nav-button" id="deck-next" type="button">下一张</button>
              </div>
              <div id="recommendation-list" class="recommendation-list"></div>
            </div>
          </section>
        </section>

        <aside class="signal-column">
          <section class="panel signal-panel">
            <div class="panel-head panel-head-tight">
              <div>
                <div class="panel-kicker">用户信号</div>
                <h2>Preference State</h2>
              </div>
            </div>
            <div class="signal-stack">
              <div class="signal-block">
                <h3>已点赞</h3>
                <div id="liked-list" class="mini-list"></div>
              </div>
              <div class="signal-block">
                <h3>偏好标签</h3>
                <div id="signal-cloud" class="chip-cloud"></div>
              </div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <template id="card-template">
      <article class="card">
        <div class="card-media"></div>
        <div class="card-body">
          <div class="card-topline">
            <span class="rank-pill"></span>
            <span class="score-pill"></span>
            <span class="route-pill"></span>
          </div>
          <h3 class="card-title"></h3>
          <div class="chip-row card-chips"></div>
          <div class="meta-row"></div>
          <div class="action-row">
            <a class="link-button open-link" target="_blank" rel="noreferrer">打开</a>
            <button class="secondary-button detail-button" type="button">查看理由</button>
            <button class="secondary-button skip-button" type="button">跳过</button>
            <button class="primary-button like-button" type="button">点赞并继续</button>
          </div>
        </div>
      </article>
    </template>

    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <section class="bottom-sheet" id="bottom-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <div class="panel-kicker">推荐理由</div>
          <h2 id="sheet-title">Reason</h2>
        </div>
        <button class="ghost-button sheet-close" id="sheet-close" type="button">关闭</button>
      </div>
      <div class="sheet-body">
        <p class="sheet-summary" id="sheet-summary"></p>
        <div class="sheet-section">
          <div class="sheet-label">概念/意图</div>
          <div class="chip-row" id="sheet-chips"></div>
        </div>
        <div class="sheet-section">
          <div class="sheet-label">证据</div>
          <div class="sheet-list" id="sheet-list"></div>
        </div>
      </div>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
